<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社長の自分史 電子ブック [v32]</title>

    <!--
        外部ライブラリ（CDN）:
          jQuery  … DOM操作（ボタン制御・テキスト更新）を簡潔に書くため
          jsPDF   … 「PDFをダウンロード」機能。ブラウザ内だけでPDFを組み立てる
    -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- スタイル（見た目）は css/book.css に分離 -->
    <link rel="stylesheet" href="css/book.css">
</head>
<body>


<!-- ── モバイル用 NAV バー（画面上部の固定ヘッダー） ──────────
     PC モードでは display:none で非表示。Mobile モードに切り替わると
     JS（BookController.applyMode）がここにハンバーガーボタンと
     ページカウンターを移動させてきて、スマホアプリ風の
     「上部に固定されたヘッダー」の見た目を作る。
     左側の領域（#mobile-navbar-left）にハンバーガー、
     右側の領域（#mobile-navbar-right）にページ番号が入る。 -->
<header class="mobile-navbar" id="mobile-navbar">
    <div class="mobile-navbar-left" id="mobile-navbar-left"></div>
    <div class="mobile-navbar-title">社長の自分史</div>
    <div class="mobile-navbar-right" id="mobile-navbar-right"></div>
</header>

<!-- ── 目次ボタン（ハンバーガーアイコン） ──────────────────
     PC モードでは画面の左上に固定表示される。
     Mobile モードでは JS によって #mobile-navbar-left の中に
     移動され、NAVバーの一部として表示される（任意の場所に置ける
     ようにするため、ここでは position は CSS の .toc-toggle-btn
     クラスではなく親要素依存の配置に切り替わる）。
     中身（章リスト）は JS（BookController._buildTocList）
     が BOOK_DATA から自動生成する。 -->
<button class="toc-toggle-btn" id="toc-toggle-btn" aria-label="目次を開く">
    <span></span><span></span><span></span>
</button>

<!-- ── 目次サイドバー本体 ───────────────────────────────
     初期状態は画面外（左に隠れている）。.open クラスが付くと
     CSS の transition でスライドインする。 -->
<nav class="toc-panel" id="toc-panel">
    <div class="toc-header">
        <span class="toc-title">目次</span>
        <button class="toc-close-btn" id="toc-close-btn" aria-label="目次を閉じる">×</button>
    </div>
    <ul class="toc-list" id="toc-list">
        <!-- JS が <li><button>...</button></li> をここに追加していく -->
    </ul>

    <!-- ── 設定セクション ────────────────────────────────
         音のON/OFF、自動ページ送りの開始/停止をまとめて配置する。
         チェックボックス（toggle）の状態は localStorage に保存され、
         次回アクセス時も覚えている（音設定のみ。自動ページ送りは
         開いた瞬間に勝手に動き出すと驚かれるため、毎回 OFF から始まる）。 -->
    <div class="toc-settings" id="toc-settings">
        <label class="toc-toggle-row">
            <span>ページめくり音</span>
            <input type="checkbox" id="sound-toggle" checked>
        </label>
        <label class="toc-toggle-row">
            <span>写真の留め方</span>
            <select id="photo-style-select" class="toc-select">
                <option value="corners">コーナー留め</option>
                <option value="pushpin">画鋲</option>
                <option value="maskingtape">マスキングテープ</option>
                <option value="tape">テープ</option>
            </select>
        </label>
        <label class="toc-toggle-row">
            <span>読み上げの声</span>
            <!-- 「女性/男性/自動」を選ぶと、その端末で使える日本語音声のうち
                 高品質なモデルを JS（BookController）が自動で割り当てる。
                 各選択肢の（　）内に実際に使われる音声名が表示される。 -->
            <select id="tts-voice-select" class="toc-select">
                <option value="female">女性</option>
                <option value="male">男性</option>
                <option value="">自動</option>
            </select>
        </label>
        <button class="auto-play-btn" id="auto-play-btn">▶ 自動ページ送り</button>
    </div>

    <!-- ── PDF書き出し領域 ──────────────────────────────
         目次パネルの下部に固定表示する。本全体を1ページずつ
         PDFに変換してダウンロードする機能の入り口。
         実際の生成処理は PdfExporter クラスが担当する。 -->
    <div class="toc-footer" id="toc-footer">
        <button class="pdf-export-btn" id="pdf-export-btn">📄 PDFをダウンロード</button>
        <p class="pdf-export-status" id="pdf-export-status"></p>
        <!-- データ管理は別ページ（manage.html）へ遷移する -->
        <a class="data-manage-btn" href="manage.html">⚙ データ管理（文章・画像）</a>
    </div>
</nav>

<!-- ── 読了プログレスバー ───────────────────────────────
     画面の最上部に固定表示する薄い線。全体の何%まで読んだかを
     currentPageIdx（または currentSpread）から計算し、
     幅を JS（updateUI）が動的に変更する。 -->
<div class="progress-bar-track" id="progress-bar-track">
    <div class="progress-bar-fill" id="progress-bar-fill"></div>
</div>

<!-- ── 背景オーバーレイ ─────────────────────────────────
     サイドバーが開いている間、本体クリックでも閉じられるように
     画面全体を薄暗く覆う透明な層。サイドバー自体より手前、
     本体（Canvas等）より奥に配置する。 -->
<div class="toc-overlay" id="toc-overlay"></div>

<!-- Canvas を .book-shell で包むことで drop-shadow を本全体に適用 -->
<div class="book-shell">
    <canvas id="book-canvas"></canvas>
</div>

<!-- JS（BookController.updateUI）から text() を書き換えてモード別の表示にする。
     PC モードではここに表示。Mobile モードでは JS が
     #mobile-navbar-right の中に移動させる。 -->
<div class="page-counter" id="page-counter"></div>

<div class="controls">
    <button class="btn" id="prev-btn">← 前へ</button>
    <button class="btn" id="tts-btn">🔊 読み上げ</button>
    <button class="btn" id="next-btn">次へ →</button>
    <button class="btn btn-debug" id="debug-mode-btn">両開き切替</button>
</div>

<!-- JS（BookController.updateUI）から text() を書き換えてモード別のヒントにする -->
<div class="hint" id="hint-text"></div>

<!-- ================================================================
     アプリケーションスクリプト
     依存順に読み込む（定数・データ → 各クラス → 起動処理 main.js が最後）。
     ES モジュールではなくクラシックな script タグを使うことで、
     サーバー経由でもローカルのダブルクリック(file://)でも確実に動く。
     ================================================================ -->
    <script src="js/util.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/sound-data.js"></script>
    <script src="data/book-data.js"></script>
    <script src="js/PageContentRenderer.js"></script>
    <script src="js/PageFlipEffect.js"></script>
    <script src="js/BookRenderer.js"></script>
    <script src="js/BookAnimator.js"></script>
    <script src="js/ImageStore.js"></script>
    <script src="js/BookmarkStore.js"></script>
    <script src="js/SettingsStore.js"></script>
    <script src="js/AudioPlayer.js"></script>
    <script src="js/PdfExporter.js"></script>
    <script src="js/BookController.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
