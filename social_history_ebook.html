/* ================================================================
   BookAnimator.js
   ── 社長の自分史 電子ブック ─ アニメーション駆動クラス

   このクラスの責務:
     ・requestAnimationFrame（RAF）ループを管理する
     ・アニメーションの進捗状態（isAnimating, progress, offFront,
       offBack 等）を「単一の状態オブジェクト」として保持する
     ・アニメーション開始時にオフスクリーン Canvas を事前生成する
       （PageContentRenderer.preRenderPage() を呼ぶ）

   このクラスの責務外:
     ・実際の描画処理
       → 完了コールバック経由で BookRenderer / BookController に委譲する
     ・どのページへ進むかの判断（ナビゲーションロジック）
       → BookController が担当する

   ── RAF ループパターン ──
     RAF はブラウザの描画タイミングに同期して関数を呼ぶ仕組み。
     setTimeout/setInterval と異なり、タブが非アクティブなら
     自動的に一時停止するためリソース効率が良い。

     進捗 t の算出:
       t = (現在時刻 - 開始時刻) / FLIP_MS
       ただし t > 1.0 になったら 1.0 にクランプしてループを終了する。
   ================================================================ */

class BookAnimator {

    /**
     * @param {Object} constants - BOOK_CONST（FLIP_MS を使用）
     * @param {PageContentRenderer} contentRenderer - 事前描画キャッシュ生成に使用
     */
    constructor(constants, contentRenderer) {
        this.C               = constants;
        this.contentRenderer = contentRenderer;

        // ── アニメーション状態（単一オブジェクトで管理） ──
        // BookRenderer.renderPC() / renderMobile() に
        // そのまま渡せる形にしてある。
        this.state = {
            isAnimating: false,
            progress:    0,      // 0.0（開始）〜 1.0（完了）
            offFront:    null,   // 事前描画キャッシュ：捲れていくページ
            offBack:     null,   // 事前描画キャッシュ：背後に現れるページ
            reverse:     false,  // true なら「前へ」方向の逆再生

            // ── ドラッグ（スワイプ）操作用の状態 ──────────────
            // isAnimating（時間駆動）とは独立した、指の動きに直接
            // 追従するための状態。同時に true になることはない
            // （beginDrag は isAnimating 中は失敗する設計のため）。
            dragging:        false, // ドラッグ操作中かどうか
            dragPages:       null,  // ドラッグ開始時の pages/spreads 配列
            dragCurrentIdx:  0,     // ドラッグ開始時の現在ページ/見開きインデックス
            dragIsMobile:    true,  // true: Mobile（pages基準） / false: PC（spreads基準）
            dragDirection:   null   // 'next' | 'prev' | 'blocked' | null
        };
    }

    /**
     * PC モードのページめくりアニメーションを開始する
     *
     * @param {Array}    spreads        - PageContentRenderer.spreads
     * @param {number}   currentSpread  - 現在の見開きインデックス
     * @param {number}   toIdx          - 移動先の見開きインデックス
     * @param {Function} onFrame        - 各フレームで呼ぶコールバック（描画担当）
     * @param {Function} onComplete     - 完了時に呼ぶコールバック（状態確定担当）
     * @param {boolean}  [reverse=false] - true なら「前へ」方向の逆再生
     * @param {number}   [durationMs] - 1回のめくりにかける時間（ミリ秒）。
     *                                   省略時は通常の FLIP_MS を使う。
     *                                   パラパラめくり機能（複数ページの
     *                                   一括移動）から、短い FLUTTER_MS を
     *                                   指定して呼ばれることがある。
     *
     * reverse の意味:
     *   false（次へ）: 現在の右ページが表面、移動先の左ページが裏面。
     *                   角度は 0°→180°（右→左へ回転）。
     *   true （前へ）: 現在の左ページが表面、移動先の右ページが裏面。
     *                   角度は 180°→0°（左→右へ回転、閉じる方向）。
     *                   PageFlipEffect.drawPCCurl 側で reverse フラグに応じて
     *                   ヒンジを綴じ目に固定したまま開始角度・終了角度を
     *                   入れ替えて描画する。
     */
    startFlipPC(spreads, currentSpread, toIdx, onFrame, onComplete, reverse = false, durationMs) {
        if (this.state.isAnimating) return;
        if (toIdx < 0 || toIdx >= spreads.length || toIdx === currentSpread) return;

        this.state.isAnimating = true;
        this.state.progress    = 0;
        this.state.reverse     = reverse;

        if (!reverse) {
            // 「次へ」: 現在の右ページ（表）→ 移動先の左ページ（裏）
            this.state.offFront = this.contentRenderer.preRenderPage(spreads[currentSpread].right, true);
            this.state.offBack  = this.contentRenderer.preRenderPage(spreads[toIdx].left,          false);
        } else {
            // 「前へ」: 現在の左ページ（表）→ 移動先の右ページ（裏）
            // すでに開いている左ページを「閉じて」前の見開きの右ページに
            // 戻っていく動きになるため、front/back の役割が次へとは逆になる。
            this.state.offFront = this.contentRenderer.preRenderPage(spreads[currentSpread].left, false);
            this.state.offBack  = this.contentRenderer.preRenderPage(spreads[toIdx].right,         true);
        }

        this._runLoop(onFrame, () => {
            this._resetState();
            onComplete(toIdx);
        }, false, durationMs);
    }

    /**
     * モバイルモードのページめくりアニメーションを開始する
     *
     * PC 版との主な違い:
     *   - spreads ではなく pages を対象にする
     *   - offFront = カールして展開・収縮するページ
     *   - offBack  = 背景として固定的に見えるページ
     *
     * @param {Array}    pages          - PageContentRenderer.pages
     * @param {number}   currentPageIdx - 現在のページインデックス
     * @param {number}   toIdx          - 移動先のページインデックス
     * @param {Function} onFrame        - 各フレームで呼ぶコールバック
     * @param {Function} onComplete     - 完了時に呼ぶコールバック
     * @param {boolean}  [reverse=false] - true なら「前へ」方向の逆再生
     * @param {number}   [durationMs] - 1回のめくりにかける時間（ミリ秒）。
     *                                   省略時は通常の FLIP_MS を使う。
     *
     * reverse の意味（「前へ」を逆再生で実現する仕組み）:
     *   false（次へ）:
     *     offFront = 現在ページ（pages[currentPageIdx]） … カールして消える
     *     offBack  = 次ページ（pages[toIdx]）             … 下から現れる
     *     progress は 0.0→1.0
     *
     *   true（前へ）:
     *     「前のページから現在ページへの“次へ”」を逆再生する。
     *     offFront = 前のページ（pages[toIdx]）           … カールが収縮して展開しきる
     *     offBack  = 現在ページ（pages[currentPageIdx]）  … 最初は全面に見えている
     *     progress は 1.0→0.0
     *     （= drawMobileCurl から見ると「t=1.0(見えない)→t=0.0(全面に見える)」
     *        という、ちょうど「次へ」の逆回しの絵になる）
     */
    startFlipMobile(pages, currentPageIdx, toIdx, onFrame, onComplete, reverse = false, durationMs) {
        if (this.state.isAnimating) return;
        if (toIdx < 0 || toIdx >= pages.length || toIdx === currentPageIdx) return;

        this.state.isAnimating = true;
        this.state.reverse     = reverse;

        if (!reverse) {
            this.state.progress = 0;
            // 「次へ」: offFront=現在ページ（消える）、offBack=次ページ（現れる）
            this.state.offFront = this.contentRenderer.preRenderPage(pages[currentPageIdx].fn, pages[currentPageIdx].isRight);
            this.state.offBack  = this.contentRenderer.preRenderPage(pages[toIdx].fn,          pages[toIdx].isRight);
        } else {
            this.state.progress = 1.0; // 逆再生は t=1.0 から開始する
            // 「前へ」: offFront=前のページ（展開していく）、offBack=現在ページ（背景）
            this.state.offFront = this.contentRenderer.preRenderPage(pages[toIdx].fn,          pages[toIdx].isRight);
            this.state.offBack  = this.contentRenderer.preRenderPage(pages[currentPageIdx].fn, pages[currentPageIdx].isRight);
        }

        this._runLoop(onFrame, () => {
            this._resetState();
            onComplete(toIdx);
        }, reverse, durationMs);
    }

    /* ================================================================
       ドラッグ（スワイプ）駆動のアニメーション制御
       ================================================================
       時間（RAF + FLIP_MS）で progress を進める startFlipMobile とは
       別の入力経路。指の移動量がそのまま progress に変換されるため、
       「ホールド（移動量ゼロ）では何も起きない」「指を動かした分だけ
       カールが追従する」という、スワイプ操作に必要な性質を持つ。

       使い方（BookController 側のタッチイベントから呼ぶ）:
         1. touchstart  → beginDrag()
         2. touchmove   → updateDragProgress(deltaX) を毎回呼ぶ
         3. touchend     → endDrag(onFrame, onCommit, onCancel) で
                            「めくり確定」か「元に戻す」かを自動判定し、
                            残りの動きだけ時間アニメーションで補完する
       ================================================================ */

    /**
     * ドラッグ操作を開始する（指が画面に触れた瞬間）
     *
     * この時点では「次へ」方向（pages[currentPageIdx] が消えて
     * pages[currentPageIdx+1] が現れる）を前提に offFront/offBack を
     * 準備する。指が右方向（前へ方向）に動いた場合は
     * updateDragProgress() 内で動的に逆方向へ切り替える。
     *
     * @param {Array}  pages          - PageContentRenderer.pages
     * @param {number} currentPageIdx - 現在のページインデックス
     * @returns {boolean} 開始できたか（既にアニメーション中なら false）
     */
    /**
     * ドラッグ操作を開始する（指/マウスが画面に触れた瞬間）
     *
     * この時点では「次へ」方向（items[currentIdx] が消えて
     * items[currentIdx+1] が現れる）を前提に offFront/offBack を
     * 準備する。指/マウスが右方向（前へ方向）に動いた場合は
     * updateDragProgress() 内で動的に逆方向へ切り替える。
     *
     * PC/Mobile 両対応について:
     *   以前はモバイル専用（pages配列・MOB_W固定）だったが、
     *   PC モードでもマウスドラッグでページをめくれるようにするため、
     *   「どちらのモードか」を isMobileMode として保持するように
     *   拡張した。これにより updateDragProgress() の中で、
     *   モバイルなら MOB_W・pages を、PC なら PAGE_W・spreads を
     *   使い分けられるようになる。
     *
     * @param {Array}   items        - PageContentRenderer.pages（Mobile）
     *                                  または .spreads（PC）
     * @param {number}  currentIdx   - 現在のページ/見開きインデックス
     * @param {boolean} [isMobileMode=true] - true なら Mobile 用の
     *                                  幅・配列の扱いをする
     * @returns {boolean} 開始できたか（既にアニメーション中なら false）
     */
    beginDrag(items, currentIdx, isMobileMode = true) {
        if (this.state.isAnimating) return false; // 時間駆動アニメーション中は割り込まない
        if (this.state.dragging) return false;     // 既にドラッグ中

        this.state.dragging       = true;
        this.state.dragPages      = items; // 名前は dragPages のままだが、PCモードでは spreads 配列が入る
        this.state.dragCurrentIdx = currentIdx;
        this.state.dragIsMobile   = isMobileMode;
        this.state.dragDirection  = null; // 'next' | 'prev' | null（まだ未確定）
        this.state.progress       = 0;
        this.state.reverse        = false;
        this.state.offFront       = null;
        this.state.offBack        = null;
        return true;
    }

    /**
     * ドラッグの移動量から progress を更新する（touchmove のたびに呼ぶ）
     *
     * 方向の確定タイミング:
     *   最初に意味のある移動（|deltaX| > 数px）が起きた時点で、
     *   左方向（deltaX < 0）なら「次へ」、右方向（deltaX > 0）なら
     *   「前へ」として dragDirection を確定し、その方向に対応する
     *   offFront/offBack を1度だけ準備する。
     *   方向が確定するまでは何も描画変化させない（= ホールド扱い）。
     *
     * progress の計算:
     *   移動量 |deltaX| を画面幅 MOB_W に対する比率に変換するだけ。
     *   「次へ」方向なら 0→1（左に大きく動かすほど1に近づく）。
     *   「前へ」方向なら 1→0（右に大きく動かすほど0に近づく、
     *   = drawMobileCurl 的には前ページが展開してくる）。
     *
     * @param {number} deltaX - touchstart 時の X 座標からの移動量（px）。
     *                          負の値 = 左方向（次へ）、正の値 = 右方向（前へ）
     * @returns {boolean} 現在ドラッグ中で progress が更新されたか
     */
    /**
     * ドラッグの移動量から progress を更新する（touchmove/mousemove のたびに呼ぶ）
     *
     * 方向の確定タイミング:
     *   最初に意味のある移動（|deltaX| > 数px）が起きた時点で、
     *   左方向（deltaX < 0）なら「次へ」、右方向（deltaX > 0）なら
     *   「前へ」として dragDirection を確定し、その方向に対応する
     *   offFront/offBack を1度だけ準備する。
     *   方向が確定するまでは何も描画変化させない（= ホールド扱い）。
     *
     * progress の計算:
     *   移動量 |deltaX| を画面幅（Mobile: MOB_W、PC: PAGE_W）に対する
     *   比率に変換するだけ。PC モードでは「片側のページ幅」を基準に
     *   している（見開き全体の幅ではなく、めくれるページ1枚分の幅で
     *   進捗を測ることで、Mobile と同じ感覚の操作量になる）。
     *   「次へ」方向なら 0→1（左に大きく動かすほど1に近づく）。
     *   「前へ」方向なら 1→0（右に大きく動かすほど0に近づく）。
     *
     * PC モードでの offFront/offBack の準備について:
     *   spreads[i] は { left: fn, right: fn } という形（isRight フラグを
     *   持たない）。drawPCCurl が要求する「x=0 基準に正規化された
     *   Canvas」を得るため、preRenderPage の第2引数には
     *   「right ページなら true」を明示的に渡す必要がある。
     *
     * @param {number} deltaX - ドラッグ開始時の X 座標からの移動量（px）。
     *                          負の値 = 左方向（次へ）、正の値 = 右方向（前へ）
     * @returns {boolean} 現在ドラッグ中で progress が更新されたか
     */
    updateDragProgress(deltaX) {
        if (!this.state.dragging) return false;

        const isMobileMode = this.state.dragIsMobile;
        const dragWidth = isMobileMode ? this.C.MOB_W : this.C.PAGE_W;

        // DIRECTION_THRESHOLD: 指/マウスの「ぶれ」を「スワイプ/ドラッグの
        // 意図」と誤判定しないための余裕（px）。
        const DIRECTION_THRESHOLD = 4; // px。これ未満の移動は「まだ静止」とみなす

        // 方向がまだ未確定の場合、ここで確定させる
        if (this.state.dragDirection === null) {
            // Math.abs() は絶対値（マイナスを取り除いた値）を返す関数。
            if (Math.abs(deltaX) < DIRECTION_THRESHOLD) {
                return true; // まだ判定できない（ホールド中として扱う）
            }

            const items   = this.state.dragPages; // Mobile: pages配列 / PC: spreads配列
            const curIdx  = this.state.dragCurrentIdx;

            // deltaX の符号で「どちら向きにドラッグしたか」を判定する。
            if (deltaX < 0 && curIdx < items.length - 1) {
                // 左方向 = 次へ
                this.state.dragDirection = 'next';
                this.state.reverse       = false;
                if (isMobileMode) {
                    this.state.offFront = this.contentRenderer.preRenderPage(items[curIdx].fn,     items[curIdx].isRight);
                    this.state.offBack  = this.contentRenderer.preRenderPage(items[curIdx+1].fn,   items[curIdx+1].isRight);
                } else {
                    // PC: 「次へ」は現在見開きの右ページが消えて、
                    // 次の見開きの左ページが現れる（startFlipPC と同じ組み合わせ）
                    this.state.offFront = this.contentRenderer.preRenderPage(items[curIdx].right,   true);
                    this.state.offBack  = this.contentRenderer.preRenderPage(items[curIdx+1].left,  false);
                }
            } else if (deltaX > 0 && curIdx > 0) {
                // 右方向 = 前へ
                this.state.dragDirection = 'prev';
                this.state.reverse       = true;
                if (isMobileMode) {
                    this.state.offFront = this.contentRenderer.preRenderPage(items[curIdx-1].fn,   items[curIdx-1].isRight);
                    this.state.offBack  = this.contentRenderer.preRenderPage(items[curIdx].fn,     items[curIdx].isRight);
                } else {
                    // PC: 「前へ」は現在見開きの左ページが消えて、
                    // 前の見開きの右ページが現れる（startFlipPC の reverse と同じ組み合わせ）
                    this.state.offFront = this.contentRenderer.preRenderPage(items[curIdx].left,     false);
                    this.state.offBack  = this.contentRenderer.preRenderPage(items[curIdx-1].right,  true);
                }
            } else {
                // 先頭で右方向、または末尾で左方向 → 動かせる先がない
                this.state.dragDirection = 'blocked';
                return true;
            }
        }

        if (this.state.dragDirection === 'blocked') return true;

        // 移動量を progress（0.0〜1.0）に変換する。
        // dragWidth は Mobile なら MOB_W、PC なら PAGE_W（片側ページ幅）。
        const ratio = Math.min(1.0, Math.max(0.0, Math.abs(deltaX) / dragWidth));
        this.state.progress = (this.state.dragDirection === 'next') ? ratio : (1.0 - ratio);

        return true;
    }

    /**
     * ドラッグ終了時の処理（指を離した瞬間）
     *
     * 判定基準:
     *   'next' 方向で progress が COMMIT_THRESHOLD を超えていれば
     *   「ページ送り確定」とみなし、残りを 1.0 まで自動アニメーションする。
     *   超えていなければ「キャンセル」とみなし、0.0 まで戻すアニメーションをする。
     *   'prev' 方向はこの逆（1.0 に近いほど「戻っていない」状態なので、
     *   progress が低いほど確定に近い）。
     *
     * @param {Function} onFrame    - 各フレームで呼ぶ描画コールバック
     * @param {Function} onCommit   - ページ送りが確定したときに呼ぶ
     *                                 ({direction, pages, currentIdx}) => void
     * @param {Function} onCancel   - キャンセルされたときに呼ぶ（引数なし）
     * @param {Function} [onCommitDecided] - 「確定した」と判定された直後
     *                                 （残りのアニメーションが始まる前）に呼ばれる。
     *                                 ページめくり音を「結果が決まった瞬間」に
     *                                 鳴らしたい、といった用途のための差し込み口。
     *                                 引数なしで呼ばれる。
     */
    endDrag(onFrame, onCommit, onCancel, onCommitDecided) {
        if (!this.state.dragging) return;

        const direction = this.state.dragDirection;
        this.state.dragging = false;

        // 方向未確定 or 動かせる先がない場合はそのまま何もせず終了
        if (direction === null || direction === 'blocked') {
            this._resetState();
            onFrame();
            onCancel();
            return;
        }

        const COMMIT_THRESHOLD = 0.25; // 画面幅の25%以上動かしたら確定
        const progress = this.state.progress;

        // 'next': progress が大きいほど確定に近い
        // 'prev': progress が小さいほど確定に近い（1.0→0.0 方向のため）
        const committed = (direction === 'next')
            ? (progress >= COMMIT_THRESHOLD)
            : (progress <= (1.0 - COMMIT_THRESHOLD));

        this.state.isAnimating = true; // 以降は時間駆動アニメーションとして補完する

        if (committed) {
            // ここで「確定した」ことが判明する。残りのアニメーションを
            // 始める前に通知することで、効果音などを「結果が決まった
            // 瞬間」に鳴らせるようにしている。
            if (onCommitDecided) onCommitDecided();

            // 残りを終端まで自動アニメーションさせる。
            // 'next' なら progress→1.0、'prev' なら progress→0.0 が終端。
            this._animateProgressTo(direction === 'next' ? 1.0 : 0.0, onFrame, () => {
                const finishedIdx = (direction === 'next')
                    ? this.state.dragCurrentIdx + 1
                    : this.state.dragCurrentIdx - 1;
                this._resetState();
                onCommit(finishedIdx);
            });
        } else {
            // キャンセル: 元の状態（'next'なら0.0、'prev'なら1.0）に戻す
            this._animateProgressTo(direction === 'next' ? 0.0 : 1.0, onFrame, () => {
                this._resetState();
                onCancel();
            });
        }
    }

    /**
     * 現在の progress から指定した目標値まで、時間ベースで滑らかに補完する
     *
     * ドラッグ終了後の「確定 or キャンセル」の残り区間を、
     * 指を離した位置から自然に閉じる／開くアニメーションとして仕上げる。
     * 移動距離に応じて所要時間を短縮する（わずかな残りなら短時間で完了する）。
     *
     * @param {number}   targetProgress - 0.0 または 1.0
     * @param {Function} onFrame
     * @param {Function} onDone
     * @private
     */
    _animateProgressTo(targetProgress, onFrame, onDone) {
        const startProgress = this.state.progress;
        const distance       = Math.abs(targetProgress - startProgress);
        // 残り距離が小さいほど短時間で終わらせる（最低120ms、最大はFLIP_MSと同じ）
        const duration = Math.max(120, distance * this.C.FLIP_MS);
        const startTime = performance.now();

        const step = (now) => {
            const elapsed = Math.min((now - startTime) / duration, 1.0);
            this.state.progress = startProgress + (targetProgress - startProgress) * elapsed;
            onFrame();

            if (elapsed < 1.0) {
                requestAnimationFrame(step);
            } else {
                this.state.progress = targetProgress; // 浮動小数の誤差を確実に終端値へ
                onDone();
            }
        };

        requestAnimationFrame(step);
    }

    /**
     * RAF ループの本体（PC/Mobile 共通処理）
     *
     * @param {Function} onFrame    - 進捗更新後に毎フレーム呼ぶ（描画トリガー）
     * @param {Function} onComplete - 進捗が終端（0.0 または 1.0）に達したら呼ぶ
     * @param {boolean}  [reverse=false] - true なら進捗を 1.0→0.0 に向けて進める
     *
     * reverse の使い道:
     *   「前へ」を逆再生で実現する場合、offFront/offBack の役割を
     *   入れ替えた上で、進捗の向きそのものも逆転させる必要がある。
     *   例えば「ページN-1からページNへの“次へ”アニメーション」を
     *   逆に再生すれば、見た目は「ページNからページN-1への“前へ”」になる。
     *   そのアニメーションは t=1.0（N-1が完全にカールして消えた状態
     *   ＝現在の表示）から始まり、t=0.0（N-1が画面いっぱいに戻った状態）
     *   で終わる。
     * @private
     */
    /**
     * RAF ループの本体（PC/Mobile 共通処理）
     *
     * @param {Function} onFrame    - 進捗更新後に毎フレーム呼ぶ（描画トリガー）
     * @param {Function} onComplete - 進捗が終端（0.0 または 1.0）に達したら呼ぶ
     * @param {boolean}  [reverse=false] - true なら進捗を 1.0→0.0 に向けて進める
     * @param {number}   [durationMs] - 1回のアニメーションにかける時間（ミリ秒）。
     *                                   省略時は通常の FLIP_MS を使う。
     *                                   パラパラめくり（startFlutterPC等）では
     *                                   ここに短い FLUTTER_MS を渡す。
     *
     * reverse の使い道:
     *   「前へ」を逆再生で実現する場合、offFront/offBack の役割を
     *   入れ替えた上で、進捗の向きそのものも逆転させる必要がある。
     *   例えば「ページN-1からページNへの“次へ”アニメーション」を
     *   逆に再生すれば、見た目は「ページNからページN-1への“前へ”」になる。
     *   そのアニメーションは t=1.0（N-1が完全にカールして消えた状態
     *   ＝現在の表示）から始まり、t=0.0（N-1が画面いっぱいに戻った状態）
     *   で終わる。
     * @private
     */
    _runLoop(onFrame, onComplete, reverse = false, durationMs) {
        const startTime = performance.now();
        const flipMs     = durationMs || this.C.FLIP_MS;
        const state      = this.state;

        const step = (now) => {
            // 経過時間から線形進捗（0.0〜1.0）を算出
            const elapsed = Math.min((now - startTime) / flipMs, 1.0);
            // reverse なら 1.0 を基点に減算し、進行方向を反転させる
            state.progress = reverse ? (1.0 - elapsed) : elapsed;
            onFrame();

            // reverse の有無に関わらず、経過時間が flipMs に達したら終了
            // （reverse は progress の値の意味を反転させるだけで、
            //   ループの終了判定そのものは elapsed を基準にする）
            if (elapsed < 1.0) {
                requestAnimationFrame(step); // 次フレームも続ける
            } else {
                onComplete(); // アニメーション完了
            }
        };

        requestAnimationFrame(step);
    }

    /**
     * アニメーション完了後の状態リセット
     *
     * オフスクリーン Canvas の参照を null にして
     * ガベージコレクションに解放を促す。
     * @private
     */
    _resetState() {
        this.state.isAnimating = false;
        this.state.progress    = 0;
        this.state.offFront    = null;
        this.state.offBack     = null;
        this.state.reverse     = false;

        // ドラッグ状態もここで併せてリセットする。
        // beginDrag → endDrag の正常フローでは endDrag 内で
        // dragging=false は既に設定済みだが、それ以外の経路
        // （例: 時間駆動アニメーション完了時）でも一貫してクリアしておく。
        this.state.dragging       = false;
        this.state.dragPages      = null;
        this.state.dragCurrentIdx = 0;
        this.state.dragIsMobile   = true;
        this.state.dragDirection  = null;
    }
}

// ================================================================
/* ================================================================
   ImageStore.js
   ── 社長の自分史 電子ブック ─ 画像の保存・読込クラス

   このクラスの責務:
     ・ドロップされた画像ファイルを Base64 文字列に変換する
     ・見開きインデックスをキーに localStorage へ保存する
     ・ページ表示時に画像を読み込んで Image オブジェクトを返す

   このクラスの責務外:
     ・画像をどこに・どのサイズで描くか
       → PageContentRenderer が担当する（このクラスから値を受け取るだけ）
     ・ドラッグ＆ドロップのイベント検出（dragover/drop）
       → BookController が担当する（このクラスのメソッドを呼ぶだけ）

   ── 保存形式 ──
     localStorage のキー: "ebook-image:<見開きインデックス>"
     値: 画像の Base64 データURL文字列（例: "data:image/png;base64,..."）

     見開きインデックスをキーにしている理由:
       「見開き」という単位はページめくり中も変わらない安定した識別子。
       PC/Mobile モードの切り替えがあっても、見開きインデックスから
       常に同じ画像を参照できる。

   ── 容量に関する注意 ──
     localStorage は通常 5MB 程度の上限がある。
     大きな画像を複数枚保存する用途には適さないため、
     本実装では「読み込み時に画像を縮小してから保存する」
     （_resizeImage）ことで 1 枚あたりの容量を抑えている。

   ── async / await / Promise について（初心者向け補足） ──
     このクラスのメソッドには async という単語が付いているものが多い。
     画像の読み込みやリサイズは「時間がかかる処理」で、処理が終わるまで
     プログラムの実行を止めて待つことができない（止めるとブラウザ全体が
     固まってしまう）。そこで JavaScript では「後で結果が届く約束」を
     表す Promise（プロミス）という仕組みを使う。

     - 関数の前に async を付けると、その関数は必ず Promise を返す
       関数になる（普通の値を return しても自動的に Promise に包まれる）。
     - 関数の中で await を付けると、「その Promise の結果が届くまで
       ここで待つ」という意味になる。await は async が付いた関数の
       中でしか使えない。
     - 呼び出す側も、結果を受け取るには await を使うか、
       .then(結果 => {...}) という書き方をする必要がある。

     例えば saveImage() の中の
       const rawDataUrl = await this._readFileAsDataUrl(file);
     は「ファイルの読み込みが終わるまで待ってから、結果を
     rawDataUrl という変数に入れる」という意味になる。
   ================================================================ */

class ImageStore {

    /**
     * @param {string} [storagePrefix] - localStorage キーの接頭辞
     * @param {number}  [maxDimension]  - 保存前に縮小する最大辺の長さ（px）
     */
    constructor(storagePrefix = 'ebook-image:', maxDimension = 1000) {
        this.prefix       = storagePrefix;
        this.maxDimension  = maxDimension;
    }

    /**
     * 見開きインデックスに対応する localStorage キーを生成する
     * @param {number} spreadIndex
     * @returns {string}
     * @private
     */
    _keyFor(spreadIndex) {
        return `${this.prefix}${spreadIndex}`;
    }

    /**
     * ドロップされたファイルを読み込み、縮小してから保存する
     *
     * 処理の流れ:
     *   1. File → データURL（FileReader.readAsDataURL）
     *   2. データURL → Image オブジェクトとして読み込み
     *   3. Canvas 経由で maxDimension 以下にリサイズ
     *   4. リサイズ後のデータURLを localStorage に保存
     *
     * @param {File}   file        - input/drop から得られた画像ファイル
     * @param {number} spreadIndex - 保存先の見開きインデックス
     * @returns {Promise<string>}   保存したデータURL文字列
     */
    async saveImage(file, spreadIndex) {
        const rawDataUrl    = await this._readFileAsDataUrl(file);
        const resizedDataUrl = await this._resizeImage(rawDataUrl, this.maxDimension);

        try {
            localStorage.setItem(this._keyFor(spreadIndex), resizedDataUrl);
        } catch (e) {
            // 容量超過（QuotaExceededError）などをここで捕捉する。
            // 保存に失敗してもアプリ全体を止めないよう、呼び出し元に
            // データURLだけは返して「今回の表示」だけは継続できるようにする。
            console.warn('画像の保存に失敗しました（容量上限の可能性があります）:', e);
        }

        return resizedDataUrl;
    }

    /**
     * ドロップされたファイルを読み込み、リサイズだけして返す
     * （localStorage への保存は行わない）
     *
     * saveImage() との違い:
     *   現時点では「画像を見開きに紐づけて永続化する」機能は
     *   まだ有効にしていない（将来的に対応予定）。そのため、
     *   今は「表示している間だけメモリ上に保持する」という
     *   軽量版の処理として、このメソッドを別に用意している。
     *   リサイズのロジック（_resizeImage）は将来の保存機能とも
     *   共有できるよう、saveImage() と同じ処理を呼び出している。
     *
     * @param {File} file - input/drop から得られた画像ファイル
     * @returns {Promise<string>} リサイズ後のデータURL文字列
     */
    async prepareImage(file) {
        const rawDataUrl     = await this._readFileAsDataUrl(file);
        const resizedDataUrl = await this._resizeImage(rawDataUrl, this.maxDimension);
        return resizedDataUrl;
    }

    /**
     * 見開きインデックスに対応する画像を読み込む
     *
     * @param {number} spreadIndex
     * @returns {Promise<HTMLImageElement|null>}
     *   保存されていれば読み込み済み Image を、なければ null を返す
     */
    async loadImage(spreadIndex) {
        const dataUrl = localStorage.getItem(this._keyFor(spreadIndex));
        if (!dataUrl) return null;
        return this._dataUrlToImage(dataUrl);
    }

    /**
     * 見開きインデックスに画像が保存済みかどうかを同期的に確認する
     * （Image の読み込み完了を待たずに真偽値だけ知りたい場合に使う）
     *
     * @param {number} spreadIndex
     * @returns {boolean}
     */
    hasImage(spreadIndex) {
        return localStorage.getItem(this._keyFor(spreadIndex)) !== null;
    }

    /**
     * 見開きインデックスの画像を削除する
     * @param {number} spreadIndex
     */
    removeImage(spreadIndex) {
        localStorage.removeItem(this._keyFor(spreadIndex));
    }

    /**
     * File オブジェクトを データURL文字列として読み込む
     * @param {File} file
     * @returns {Promise<string>}
     * @private
     */
    _readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload  = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(file);
        });
    }

    /**
     * データURL文字列を Image オブジェクトとして読み込む
     * @param {string} dataUrl
     * @returns {Promise<HTMLImageElement>}
     * @private
     */
    _dataUrlToImage(dataUrl) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload  = () => resolve(img);
            img.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
            img.src = dataUrl;
        });
    }

    /**
     * 画像を maxDimension 以下に縮小し、新しいデータURLとして返す
     *
     * 縮小する理由:
     *   localStorage の容量上限（多くのブラウザで約5MB）に収まるよう、
     *   保存前に画像サイズを抑える。スマートフォンで撮影した写真などは
     *   そのままだと数MBになるため、長辺を maxDimension に合わせる。
     *
     * @param {string} dataUrl
     * @param {number} maxDimension
     * @returns {Promise<string>}
     * @private
     */
    async _resizeImage(dataUrl, maxDimension) {
        const img = await this._dataUrlToImage(dataUrl);

        // 縦横の長い方を maxDimension に合わせる縮小率を計算
        // （すでに小さい画像は拡大しない = scale の上限を 1 にする）
        const scale = Math.min(1, maxDimension / Math.max(img.width, img.height));
        const w = Math.round(img.width  * scale);
        const h = Math.round(img.height * scale);

        const off    = document.createElement('canvas');
        off.width    = w;
        off.height   = h;
        const offCtx = off.getContext('2d');
        offCtx.drawImage(img, 0, 0, w, h);

        // JPEG 品質 0.85 で書き出し、ファイルサイズを抑える
        return off.toDataURL('image/jpeg', 0.85);
    }
}

// 7.5. BookmarkStore（しおり機能）
// ================================================================
/* ================================================================
   BookmarkStore.js
   ── 社長の自分史 電子ブック ─ 読書位置の保存・読込クラス

   このクラスの責務:
     ・「最後に開いていたページ」を localStorage に保存する
     ・次回アクセス時にその位置を読み込んで返す
     ・保存されている位置を消す（最初からやり直したい場合用）

   このクラスの責務外:
     ・いつ保存するか、いつ読み込んだ位置にジャンプするかの判断
       → BookController が担当する（このクラスは「保存する」
         「読み込む」という操作そのものだけを提供する）
     ・PC/Mobile どちらの座標系を使うかの変換
       → BookController が既に持っている currentSpread ⇄
         currentPageIdx の変換ロジックをそのまま使う

   ── ImageStore との関係 ──
     このクラスは ImageStore（画像のドラッグ＆ドロップ保存）と
     同じ「localStorage を使う」という性質を持つが、保存する内容
     （数値のページ位置 vs 画像データ）が全く異なるため、
     別クラスとして分離している。1つのクラスに無関係な責務を
     混ぜると、後から読み返したときに分かりにくくなるため。

   ── 保存形式 ──
     localStorage のキー: 固定のキー名（複数の本を区別する必要が
     ない前提なので、ImageStore のような連番キーではなく単一の
     キーにシンプルな JSON 文字列を保存する）。
     値の例: {"spreadIndex": 3, "pageIndex": 6}

   ── JSON.stringify / JSON.parse について（初心者向け補足） ──
     localStorage は「文字列」しか保存できない決まりがある
     （数値やオブジェクトをそのまま保存することはできない）。
     JSON.stringify(オブジェクト) は、オブジェクトを「文字列の形」に
     変換する関数。逆に JSON.parse(文字列) は、その文字列を元の
     オブジェクトの形に戻す関数。この2つを組み合わせることで、
     「オブジェクト → 文字列にして保存 → 文字列を取り出して
     オブジェクトに戻す」という往復ができるようになる。
   ================================================================ */

class BookmarkStore {

    /**
     * @param {string} [storageKey] - localStorage に保存する際のキー名
     */
    constructor(storageKey = 'ebook-bookmark') {
        this.key = storageKey;
    }

    /**
     * 現在の読書位置を保存する
     *
     * @param {number} spreadIndex - PC モードの見開きインデックス
     * @param {number} pageIndex   - Mobile モードのページインデックス
     */
    save(spreadIndex, pageIndex) {
        try {
            const value = JSON.stringify({ spreadIndex, pageIndex });
            localStorage.setItem(this.key, value);
        } catch (e) {
            // localStorage が使えない環境（プライベートブラウジング等）
            // でも、しおり機能が無いだけで本自体は問題なく読めるべきなので、
            // ここで例外を投げてアプリ全体を止めるのではなく、
            // 警告だけ出してそのまま処理を続行する。
            console.warn('しおりの保存に失敗しました:', e);
        }
    }

    /**
     * 保存されている読書位置を読み込む
     *
     * @returns {{spreadIndex: number, pageIndex: number} | null}
     *          保存データが無い、または壊れている場合は null を返す
     */
    load() {
        try {
            const raw = localStorage.getItem(this.key);
            if (!raw) return null; // 一度も保存されていない（初回訪問）

            const parsed = JSON.parse(raw);

            // 保存されていた値が期待する形（spreadIndex・pageIndex が
            // どちらも数値）になっているかを確認する。
            // 壊れたデータ（手動編集やバージョン違いなど）を
            // そのまま使うと、存在しないページ番号にジャンプして
            // 画面が真っ白になる、といった不具合の原因になるため、
            // 形が違う場合は安全側に倒して null（＝最初から開く）を返す。
            if (typeof parsed.spreadIndex !== 'number' || typeof parsed.pageIndex !== 'number') {
                return null;
            }

            return parsed;
        } catch (e) {
            // JSON.parse に失敗した場合（保存データが壊れている）もここに来る
            console.warn('しおりの読込に失敗しました:', e);
            return null;
        }
    }

    /**
     * 保存されている読書位置を削除する（最初からやり直す用）
     */
    clear() {
        try {
            localStorage.removeItem(this.key);
        } catch (e) {
            console.warn('しおりの削除に失敗しました:', e);
        }
    }
}


// ================================================================
// 7.6. AudioPlayer（ページめくり音）
// ================================================================
/* ================================================================
   AudioPlayer.js
   ── 社長の自分史 電子ブック ─ 音声再生クラス

   このクラスの責務:
     ・ページめくり音（rustling.mp3）の再生だけを担当する
     ・連続して何度も再生しても重なって耳障りにならないよう、
       再生のたびに音声を「最初から」再生し直す制御を持つ

   このクラスの責務外:
     ・いつ音を鳴らすか（ページめくりのどのタイミングか）の判断
       → BookController が「めくりが確定した瞬間」に play() を
         呼ぶだけで、このクラス自体はページの状態を何も知らない

   ── 音声データの埋め込み方法（初心者向け補足） ──
     本来、音声ファイルは <audio src="rustling.mp3"> のように
     別ファイルとして参照することが多い。しかし、このプロジェクトは
     「全部を1つの HTML ファイルにまとめる」という方針のため、
     音声データそのものを文字列に変換してコードの中に直接埋め込んでいる。

     その変換方法が「データURL（Base64エンコード）」という仕組み。
     画像や音声などのバイナリデータ（0と1の羅列）を、
     英数字だけの文字列に変換する規格を Base64 と呼ぶ。
     "data:audio/mpeg;base64,◯◯◯◯..." という形式の文字列を
     <audio> や Audio オブジェクトの src にそのまま渡すと、
     ブラウザは「これは外部ファイルではなく、文字列自体が
     音声データそのものだ」と理解して再生できる。
     メリットは「別ファイルを用意しなくて良い」こと、
     デメリットは「文字列が長くなり、HTML ファイル自体が
     大きくなる」こと（今回は約38KBの音声なので約51KBの
     文字列になっている）。

   ── 再生のたびに最初から再生し直す理由 ──
     HTMLAudioElement（new Audio()で作るオブジェクト）は、
     一度 play() すると再生中の状態を保持する。
     ページをすばやく連続でめくると、前の再生が終わる前に
     次の play() が呼ばれることがあり、何も対策しないと
     「再生中の音声に対して再度 play() するだけ」になって
     2回目以降の音が鳴らない（または変な位置から再生される）
     ことがある。これを避けるため、再生前に currentTime を 0 に
     戻してから play() することで、毎回「最初から」確実に
     鳴らせるようにしている。
   ================================================================ */

class AudioPlayer {

    /**
     * @param {string} dataUrl - "data:audio/mpeg;base64,..." 形式の音声データURL
     * @param {number} [volume] - 再生音量（0.0〜1.0）。控えめな音量を既定値にしている
     */
    constructor(dataUrl, volume = 0.45) {
        // new Audio(url) で音声オブジェクトを作成する。
        // <audio> タグを HTML に書かずに、JavaScript だけで
        // 音声を扱えるようにするための標準的な書き方。
        this.audio = new Audio(dataUrl);
        this.audio.volume = volume;

        // ページめくり音の ON/OFF 状態。
        // setEnabled() で切り替え、play() の冒頭でこのフラグを
        // 確認することで、「OFF のときは何もしない」を実現する。
        // 既定値は true（音が鳴る）。
        this.enabled = true;

        // 音声ファイルの読み込み自体に失敗した場合（データが壊れている、
        // ブラウザが対応していない形式、サンドボックス化された
        // プレビュー環境で音声再生自体がブロックされている、等）に
        // 備えて、エラーが起きてもアプリ全体が止まらないように
        // イベントリスナーで捕捉しておく。
        //
        // 補足: claude.ai のファイルプレビュー（iframe内）のような
        // サンドボックス環境では、セキュリティ上の理由で data: URL の
        // 音声再生がブロックされることがある。これはコードの問題では
        // なく環境側の制約のため、ファイルをダウンロードして直接
        // ブラウザで開けば問題なく再生される。
        this.audio.addEventListener('error', () => {
            const err = this.audio.error;
            console.warn('[AudioPlayer] 音声の読み込みに失敗しました。ページめくり音は再生されません。',
                'errorCode=', err ? err.code : '不明',
                '(1=ABORTED, 2=NETWORK, 3=DECODE, 4=SRC_NOT_SUPPORTED)');
        });
    }

    /**
     * ページめくり音の ON/OFF を切り替える
     * @param {boolean} enabled - true なら音を鳴らす、false なら鳴らさない
     */
    setEnabled(enabled) {
        this.enabled = enabled;
    }

    /**
     * ページめくり音を再生する
     *
     * 呼び出すたびに必ず最初（0秒地点）から再生し直す。
     * play() は Promise を返す仕様だが、ユーザーが音声を一度も
     * 操作していないブラウザでは再生がブロックされることがある
     * （多くのブラウザの「自動再生防止」機能）。
     * ページめくりボタンのクリックやスワイプ操作の直後に呼ばれる
     * 想定なので通常は問題ないが、念のため失敗時にエラーが
     * コンソールに大量に出ないよう catch() で握りつぶしている。
     */
    play() {
        if (!this.enabled) return; // OFF設定のときは何もしない

        try {
            this.audio.currentTime = 0; // 再生位置を先頭に戻す
            const playPromise = this.audio.play();
            // play() が Promise を返す場合のみ catch を付ける
            // （古いブラウザでは undefined を返すことがあるため）
            if (playPromise && typeof playPromise.catch === 'function') {
                playPromise.catch((err) => {
                    // 自動再生制限やサンドボックス環境などで再生が
                    // ブロックされた場合はここに来る。
                    // ページめくり自体は問題なく動作するべきなので、
                    // ここでは警告を出すだけでアプリを止めない。
                    console.warn('[AudioPlayer] 再生がブロックされました:', err.name, err.message);
                });
            }
        } catch (e) {
            console.warn('[AudioPlayer] 再生中にエラーが発生しました:', e);
        }
    }
}

// 7.7. PdfExporter（PDF書き出し機能）
// ================================================================
/* ================================================================
   PdfExporter.js
   ── 社長の自分史 電子ブック ─ PDF書き出しクラス

   このクラスの責務:
     ・全ページ（表紙〜終章）を1冊のPDFファイルに変換する
     ・変換中の進捗（今何ページ目を処理しているか）を
       呼び出し側に伝える（プログレス表示のため）

   このクラスの責務外:
     ・どのタイミングでPDF化を開始するか（ボタンのイベント等）
       → BookController が担当する
     ・PDFのページレイアウトの細かい計算（中身は jsPDF ライブラリが
       内部で処理する）

   ── 仕組み（処理の流れ） ──
     1. PageContentRenderer.preRenderPage() で各ページの内容を
        Canvas に描く（既存のキャッシュ機構がそのまま使えるので、
        本を読んでいる間に既に表示したページは再描画コストがゼロ）
     2. そのCanvasを canvas.toDataURL() で画像データに変換する
     3. jsPDF の addImage() でPDFの1ページに貼り付ける
     4. 全ページ終わったら save() でダウンロードを開始する

   ── jsPDF ライブラリについて（初心者向け補足） ──
     jsPDF は「ブラウザの中だけでPDFファイルを組み立てる」ための
     ライブラリ。サーバーに送信したり、特別なソフトをインストール
     したりする必要がなく、JavaScript の new jsPDF(...) でPDF文書を
     作り始め、addImage() や text() で内容を追加し、最後に save() を
     呼ぶとブラウザが自動的にファイルをダウンロードしてくれる。

   ── なぜ「重い処理」への対策が必要か ──
     全ページ分の Canvas 描画・画像変換・PDF への追加を一度に
     まとめて実行すると、ページ数が多い場合にブラウザが一瞬
     「固まった」ように見えることがある。これを避けるため、
     1ページ処理するごとに setTimeout(..., 0) で「いったん
     ブラウザに制御を返す」処理を挟んでいる。これにより、
     処理の合間にブラウザが画面更新（プログレス表示の反映など）
     を行う時間を確保できる。
   ================================================================ */

class PdfExporter {

    /**
     * @param {PageContentRenderer} contentRenderer - 各ページの描画を担当するクラス
     * @param {Object} constants - BOOK_CONST（PAGE_W, PC_H を使用）
     */
    constructor(contentRenderer, constants) {
        this.contentRenderer = contentRenderer;
        this.C               = constants;
    }

    /**
     * 全ページをPDFに変換してダウンロードする
     *
     * @param {Function} [onProgress] - 各ページ処理後に呼ばれる
     *        (current, total) => void 形式のコールバック。
     *        プログレス表示の更新に使う。
     * @returns {Promise<void>} 全ページの処理とダウンロード開始が
     *        完了したら解決される Promise
     */
    async exportToPdf(onProgress) {
        const { PAGE_W, PC_H } = this.C;
        const pages = this.contentRenderer.pages;
        const total = pages.length;

        // jsPDF のインスタンスを作る。
        // 第3引数の [PAGE_W, PC_H] で「PDFの1ページのサイズ」を
        // 直接 Canvas の解像度（ピクセル数）と同じ値に指定している。
        // 単位（'pt'）はピクセルとほぼ同じ感覚で使える単位なので、
        // 「Canvas に描いた絵をそのままの大きさでPDFに貼る」という
        // 単純な対応関係になり、余計な縮小・拡大の計算が要らない。
        const pdf = new jspdf.jsPDF({
            orientation: 'portrait',
            unit: 'pt',
            format: [PAGE_W, PC_H]
        });

        for (let i = 0; i < total; i++) {
            const page = pages[i];

            // 既存のキャッシュ機構をそのまま利用する。
            // 既に画面に表示したことのあるページなら、ここでは
            // 「描き直す」のではなく「キャッシュを取り出すだけ」になる。
            const canvas = this.contentRenderer.preRenderPage(page.fn, page.isRight);

            // Canvas の内容を JPEG画像データ（データURL文字列）に変換する。
            // PNGより JPEG の方がファイルサイズが小さくなるため、
            // 文章中心のページでは JPEG を採用している
            // （第2引数の 0.92 は画質。1.0に近いほど高画質・大きいサイズ）。
            const imgData = canvas.toDataURL('image/jpeg', 0.92);

            if (i > 0) {
                // 2ページ目以降は、新しいページを追加してから画像を貼る。
                // 1ページ目は new jsPDF() の時点で既に1ページ分が
                // 用意されているため、addPage() は不要。
                pdf.addPage([PAGE_W, PC_H], 'portrait');
            }
            pdf.addImage(imgData, 'JPEG', 0, 0, PAGE_W, PC_H);

            if (onProgress) onProgress(i + 1, total);

            // setTimeout(fn, 0) について（初心者向け補足）:
            //   「0ミリ秒後に実行して」という指定だが、実際には
            //   「今実行中の処理が一区切りついたら、できるだけ早く
            //   実行して」という意味になる。これを挟むことで、
            //   ループの途中でブラウザに一瞬「次に何をすべきか
            //   考える時間」を与えられる（画面の再描画や、他の
            //   操作への応答などがこのタイミングで行われる）。
            //   await と組み合わせることで、ループ全体が
            //   「ブラウザを固まらせない」形で進行する。
            await new Promise((resolve) => setTimeout(resolve, 0));
        }

        // ファイル名は本のタイトルが分かるようにしておく。
        // 半角スペースや記号を避けたシンプルな名前にしている。
        pdf.save('社長の自分史.pdf');
    }
}
